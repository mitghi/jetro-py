name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x86_64:
    name: build wheel — linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          # `manylinux_2_28` ships GCC 12 with full C11 / __has_include
          # / <stdatomic.h> support, which the CRoaring sources pulled
          # in by jetro-experimental need. The older `2014` image lacks
          # those headers in its cross-compile toolchain and breaks the
          # build.
          manylinux: "2_28"
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist

  linux-aarch64:
    name: build wheel — linux aarch64 (native arm64)
    # Use GitHub's native arm64 Linux runner instead of cross-
    # compiling under QEMU. Avoids the cross-toolchain header gap
    # that caused CRoaring to fail with `stdatomic.h: No such file
    # or directory` on the manylinux2014 cross builder.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: "2_28"
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: dist

  macos-aarch64:
    name: build wheel — macOS aarch64 (native arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  windows:
    name: build wheel — windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist

  sdist:
    name: build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: publish to PyPI (trusted publisher)
    needs: [linux-x86_64, linux-aarch64, macos-aarch64, windows, sdist]
    runs-on: ubuntu-latest
    # Optional: gate the publish step behind a protected GitHub
    # environment (PyPI's trusted-publisher form prompts for it).
    # Leave as `release` and create the matching environment on
    # GitHub under Settings → Environments → New environment.
    environment:
      name: release
      url: https://pypi.org/project/jetro/
    permissions:
      # `id-token: write` is required for OIDC: GitHub mints a short-
      # lived token and PyPI exchanges it for an upload credential.
      # No PyPI API token has to live in repo secrets.
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI via trusted publisher
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
